<title>GIFT Fitness</title>
<style>
:root { --sat: env(safe-area-inset-top, 44px); }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#f0f0f0;font-size:15px;display:flex;flex-direction:column;align-items:center;width:100%;overflow-x:hidden;}
button{cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none;}
input,select,textarea{font-family:inherit;-webkit-appearance:none;outline:none;}

#page-setup{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;padding:20px;z-index:99;}
#page-list{display:none;width:100%;max-width:480px;margin:0 auto;overflow-x:hidden;}
#page-detail{display:none;width:100%;max-width:480px;margin:0 auto;overflow-x:hidden;}
#page-guide{display:none;width:100%;max-width:480px;margin:0 auto;overflow-x:hidden;}

.card{background:#1c1c1c;border-radius:20px;padding:32px 22px;width:100%;max-width:340px;text-align:center;border:2px solid #e55a00;}
.card h1{color:#e55a00;font-size:26px;font-weight:900;letter-spacing:3px;margin-bottom:4px;}
.card p{color:#555;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
.inp{display:block;width:100%;padding:14px;background:#111;border:1.5px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:16px;margin-bottom:12px;}
.inp:focus{border-color:#e55a00;}
.btn{display:block;width:100%;padding:14px;background:#e55a00;color:#fff;border-radius:10px;font-size:16px;font-weight:800;}
.btn:active{opacity:.8;}
.err{color:#ff5555;font-size:13px;margin-top:8px;min-height:20px;}

.header{background:#1c1c1c;border-bottom:2px solid #e55a00;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;transition:top .2s ease;width:100%;box-sizing:border-box;overflow-x:hidden;}
.hrow{display:flex;align-items:center;justify-content:space-between;}
.htitle{font-size:18px;font-weight:900;color:#e55a00;letter-spacing:2px;}
.hinfo{font-size:11px;color:#555;margin-top:2px;}
.hdot{width:8px;height:8px;border-radius:50%;background:#5ce8a8;display:inline-block;margin-right:4px;}
.hdot.red{background:#ff5555;}
.hdot.yellow{background:#ffc107;}
.hbtn{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700;}
.hbtn-o{background:#e55a00;color:#fff;}
.hbtn-g{background:#2a2a2a;color:#aaa;border:1px solid #333;margin-right:6px;}

.sbar{background:#1c1c1c;padding:10px 14px;border-bottom:1px solid #1a1a1a;width:100%;box-sizing:border-box;overflow-x:hidden;}
.sinp{width:100%;padding:10px 14px;background:#111;border:1.5px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:15px;}
.sinp:focus{border-color:#e55a00;}
.filters{display:flex;gap:6px;margin-top:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.filters::-webkit-scrollbar{display:none;}
.fb{white-space:nowrap;padding:6px 13px;border-radius:20px;border:1.5px solid #2a2a2a;background:#111;font-size:12px;font-weight:700;color:#555;}
.fb.on{background:#e55a00;color:#fff;border-color:#e55a00;}

.listbody{padding:12px 12px 80px;}
.mmeta{font-size:12px;color:#444;margin-bottom:10px;}
.mc{background:#1c1c1c;border:1.5px solid #2a2a2a;border-radius:14px;padding:13px;margin-bottom:9px;display:flex;align-items:center;transition:border-color .2s,box-shadow .2s;}
.mc.checked-in{border:1.5px solid #e55a00;box-shadow:0 0 16px rgba(229,90,0,0.35);background:#1e1008;}
.mc.has-mods{border:1.5px solid #9b59b6;box-shadow:0 0 14px rgba(155,89,182,0.3);background:#140e1a;}
.mc.checked-in.has-mods{border:1.5px solid #c068e0;box-shadow:0 0 18px rgba(192,104,224,0.4);background:#1d0e22;}
.mc.is-phoenix{border:2.5px solid #ff4400;box-shadow:0 0 0 1px rgba(255,68,0,0.3),0 0 20px rgba(255,68,0,0.5),0 0 40px rgba(255,68,0,0.2);background:linear-gradient(135deg,#220800,#1a0500);position:relative;}
.mc.is-phoenix::before{content:"🔥";position:absolute;top:8px;right:10px;font-size:18px;opacity:0.9;}
.mc.checked-in.is-phoenix{border:2.5px solid #ff6600;box-shadow:0 0 0 1px rgba(255,102,0,0.4),0 0 24px rgba(255,102,0,0.6),0 0 50px rgba(255,68,0,0.3);background:linear-gradient(135deg,#2a1000,#1f0800);}
.mc.is-phoenix.has-mods{border:2.5px solid #c068e0;box-shadow:0 0 0 1px rgba(192,104,224,0.3),0 0 20px rgba(255,68,0,0.3),0 0 20px rgba(155,89,182,0.3);background:linear-gradient(135deg,#1e0820,#180500);}
.mc:active{opacity:.75;}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;}
.mci{flex:1;margin-left:11px;min-width:0;}
.mcn{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcs{font-size:12px;color:#555;margin-top:2px;}
.mcw{font-size:11px;color:#ff5555;font-weight:700;margin-top:3px;}
.mcr{flex-shrink:0;margin-left:8px;text-align:right;font-size:12px;font-weight:700;}

.det-header{background:#1c1c1c;border-bottom:2px solid #e55a00;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;width:100%;max-width:480px;box-sizing:border-box;position:relative;overflow:hidden;}
.backbtn{padding:8px 13px;background:#2a2a2a;color:#f0f0f0;border-radius:8px;font-size:14px;font-weight:700;flex-shrink:0;}
.det-name{font-size:17px;font-weight:800;color:#e55a00;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;}
.editbtn{padding:8px 12px;background:#e55a00;color:#fff;border-radius:8px;font-size:13px;font-weight:700;flex-shrink:0;}

.detbody{padding:12px 12px 80px;}
.sec{background:#1c1c1c;border:1.5px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:12px;}
.sech{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:800;margin-bottom:12px;}
.addbtn{padding:6px 12px;background:#e55a00;color:#fff;border-radius:7px;font-size:12px;font-weight:700;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.ibox{background:#111;border-radius:10px;padding:10px 12px;}
.ilbl{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.5px;}
.ival{font-size:14px;font-weight:700;margin-top:3px;}

.ci-box{background:linear-gradient(135deg,#e55a00,#ff8c00);border:none;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 4px 24px rgba(229,90,0,0.5);}
.ci-day{font-size:42px;font-weight:900;line-height:1;letter-spacing:-1px;text-transform:uppercase;color:#fff!important;text-shadow:0 2px 12px rgba(0,0,0,0.3);}
.ci-bar{font-size:13px;font-weight:700;color:#ffc107;margin-top:3px;}
.ci-last{font-size:12px;color:#555;margin-top:4px;}
.inj-warn{background:rgba(255,85,85,.1);border:1px solid rgba(255,85,85,.3);border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:#ff7777;}
.inj-warn b{display:block;font-size:13px;margin-bottom:4px;}
.ci-btn{width:100%;padding:14px;background:#e55a00;color:#fff;border-radius:10px;font-size:15px;font-weight:800;margin-top:10px;}
.ci-btn:active{opacity:.8;}
.ov-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.ov-btn{padding:7px 11px;border-radius:8px;background:#2a2a2a;color:#888;border:1px solid #333;font-size:12px;font-weight:700;}
.ov-btn.sel{background:#e55a00;color:#fff;border-color:#e55a00;transform:scale(1.08);box-shadow:0 0 12px rgba(229,90,0,.5);}

.icard{background:#111;border-radius:10px;padding:11px;margin-bottom:7px;border-left:3px solid #ff5555;}
.ncard{background:#111;border-radius:10px;padding:11px;margin-bottom:7px;border-left:3px solid #e55a00;}
.irow{display:flex;justify-content:space-between;align-items:flex-start;}
.ipart{font-weight:700;font-size:14px;}
.idt{font-size:11px;color:#444;margin-top:2px;}
.inote{font-size:13px;color:#888;margin-top:5px;line-height:1.5;}
.sml-btns{display:flex;gap:4px;}
.sml-btn{padding:5px 8px;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;font-size:13px;color:#f0f0f0;}
.sbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-top:6px;}
.sb-Active{background:rgba(255,55,55,.15);color:#ff7777;border:1px solid rgba(255,55,55,.3);}
.sb-Monitoring{background:rgba(255,193,7,.15);color:#ffc107;border:1px solid rgba(255,193,7,.3);}
.sb-Resolved{background:rgba(92,232,168,.15);color:#5ce8a8;border:1px solid rgba(92,232,168,.3);}
.ndt{font-size:11px;color:#444;}
.ntxt{font-size:13px;color:#ddd;line-height:1.5;margin-top:4px;}
.nauthor{font-size:11px;color:#e55a00;margin-top:4px;}
.delbtn{display:block;width:100%;padding:12px;color:#ff5555;font-size:13px;font-weight:700;background:none;margin-top:4px;}
.empty{text-align:center;padding:14px;color:#444;font-size:13px;}

.modal-bg{display:none;position:fixed;left:0;right:0;bottom:0;top:0;background:rgba(0,0,0,.85);z-index:1100;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#1c1c1c;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85dvh;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(44px + env(safe-area-inset-bottom));border-top:2px solid #e55a00;position:relative;margin-top:auto;}
.mhandle{width:40px;height:4px;background:#2a2a2a;border-radius:2px;margin:0 auto 18px;}
.mh2{font-size:19px;font-weight:800;color:#e55a00;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:13px;border:1.5px solid #2a2a2a;border-radius:10px;font-size:16px;background:#111;color:#f0f0f0;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#e55a00;}
.fg textarea{resize:none;min-height:80px;line-height:1.5;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fbtns{display:flex;gap:10px;margin-top:16px;}
.fbtns button{flex:1;padding:14px;border-radius:10px;font-size:15px;font-weight:700;}
.fsave{background:#e55a00;color:#fff;}
.fcancel{background:#2a2a2a;color:#aaa;}
.daylist{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.dayrow{display:flex;align-items:center;gap:8px;background:#111;border-radius:8px;padding:8px 10px;}
.dayrow select{flex:1;padding:8px;border:1.5px solid #2a2a2a;border-radius:8px;font-size:13px;background:#1a1a1a;color:#f0f0f0;min-width:0;}
.daynum{font-size:12px;font-weight:800;color:#555;width:38px;flex-shrink:0;}
.dayrem{background:none;color:#ff5555;font-size:18px;padding:0 4px;}
.adddaybtn{width:100%;padding:10px;background:#1a1a1a;color:#e55a00;border:1.5px dashed #e55a00;border-radius:9px;font-size:13px;font-weight:700;margin-top:6px;}
.hist-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px;}
.hist-item:last-child{border:none;}
.gtab{white-space:nowrap;padding:9px 18px;border-radius:20px;border:1.5px solid #2a2a2a;background:#111;font-size:13px;font-weight:700;color:#555;cursor:pointer;font-family:inherit;transition:all .15s;}
.gtab.on{background:#e55a00;color:#fff;border-color:#e55a00;}
.gphase{background:#1c1c1c;border:1.5px solid #2a2a2a;border-radius:14px;padding:18px;margin-bottom:12px;}
.gphase-title{font-size:16px;font-weight:900;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #2a2a2a;}
.gphase-note{font-size:12px;font-weight:600;color:#ffc107;background:rgba(255,193,7,.08);border:1px solid rgba(255,193,7,.25);border-radius:9px;padding:8px 12px;margin-bottom:12px;line-height:1.6;}
.gex{font-size:13px;color:#ccc;padding:7px 0 7px 10px;border-bottom:1px solid #1e1e1e;line-height:1.6;position:relative;}
.gex::before{content:"";position:absolute;left:0;top:14px;width:3px;height:3px;border-radius:50%;background:#e55a00;}
.gex:last-child{border:none;}
.gsub{font-size:11px;font-weight:800;color:#e55a00;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding:4px 8px;background:rgba(229,90,0,.1);border-radius:6px;display:inline-block;}
.book-card{background:#111;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;}
.book-icon{font-size:32px;flex-shrink:0;}
.book-info{flex:1;min-width:0;}
.book-title{font-size:15px;font-weight:800;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-label{font-size:11px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.book-change{padding:8px 13px;background:#e55a00;color:#fff;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;flex-shrink:0;font-family:inherit;}
.p3-section{margin-bottom:10px;}
.p3-title{font-size:13px;font-weight:800;color:#f0f0f0;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.p3-title span{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,193,7,.15);color:#ffc107;border:1px solid rgba(255,193,7,.3);}
.p3-boxes{display:flex;gap:10px;}
.p3-box{flex:1;background:#111;border:2px solid #2a2a2a;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.p3-box.done{background:rgba(92,232,168,.1);border-color:#5ce8a8;}
.p3-box.done .p3-check{color:#5ce8a8;}
.p3-check{font-size:22px;margin-bottom:4px;}
.p3-label{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;}
.p3-box.done .p3-label{color:#5ce8a8;}
.p3-locked{opacity:.35;cursor:not-allowed;}
.p3-progress{font-size:12px;color:#555;margin-top:8px;text-align:center;}
.dial-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px;}
.dial-svg{overflow:visible;}
.dial-mins{font-size:28px;font-weight:900;color:#e55a00;margin-top:6px;text-align:center;}
.dial-sub{font-size:11px;color:#555;text-align:center;margin-top:2px;letter-spacing:.5px;text-transform:uppercase;}
.dial-btns{display:flex;gap:8px;margin-top:12px;width:100%;}
.dial-btn{flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:800;border:none;cursor:pointer;font-family:inherit;}
.dial-add{background:#e55a00;color:#fff;}
.dial-sub-btn{background:#2a2a2a;color:#aaa;border:1px solid #333;}
.dial-inp{width:100%;padding:11px;border:1.5px solid #2a2a2a;border-radius:9px;font-size:16px;background:#111;color:#f0f0f0;text-align:center;margin-top:8px;}
.ov-btn.tap-checkin{animation:tapflash .25s;}
@keyframes tapflash{0%{transform:scale(1);}50%{transform:scale(.92);}100%{transform:scale(1);}}

<script>

// ────────────────────────────────────────────────

var DAYS = ["Legs","Chest","Back","Shoulders","Arms","Rest","Phoenix"];
var PHASES = ["Phase 1","Phase 2","Phase 3","Phase 4","Phase 5","Phase 6","Phase 7","Phase 8","Phase 9","Phase 10","Phoenix","None"];
var INJ_ST = ["Active","Monitoring","Resolved"];
var AVC = ["#e55a00","#cc4400","#ff7733","#aa3300","#ff8800","#bb4400"];
var DAY_COL = {Legs:"#ff7733",Chest:"#ff7777",Back:"#6bb3ff",Shoulders:"#c4b5fd",Arms:"#5ce8a8",Rest:"#666",Phoenix:"#ff5555"};

var db = null;
var members = {};
var trainer = "";
var curId = null;

// helpers
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2);}
function avc(n){var h=0;for(var i=0;i<n.length;i++)h+=n.charCodeAt(i);return AVC[h%AVC.length];}
function today(){
  var now = new Date();
  // Day resets at 5am — subtract 5 hours so midnight-4:59am still counts as previous day
  var adjusted = new Date(now.getTime() - 5*60*60*1000);
  return adjusted.toISOString().slice(0,10);
}
function fmtD(d){if(!d)return"";try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return d;}}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function $(id){return document.getElementById(id);}
function gm(){return members[curId];}

// storage
function saveName(n){try{localStorage.setItem("gf_t",n);}catch(e){}}
function loadName(){try{return localStorage.getItem("gf_t")||"";}catch(e){return "";}}

// sync dot
function dot(s){
  var d=$("sdot");if(!d)return;
  d.className="hdot"+(s==="red"?" red":s==="yellow"?" yellow":"");
}

// ── SETUP ──────────────────────────────────────
function goEnter(){
  var n = ($("t-inp").value||"").trim();
  if(!n){ $("t-err").textContent="Please enter your name."; return; }
  trainer = n;
  saveName(n);
  // Show list immediately
  $("page-setup").style.display = "none";
  $("page-list").style.display = "block";
  buildFilters();
  renderList();
  // Firebase in background
  dot("yellow");
  setTimeout(function(){
    try{
      firebase.initializeApp(FB);
      db = firebase.database();
      db.ref("members").on("value", function(snap){
        members = snap.val() || {};
        dot("green");
        updateHdr();
        renderList();
        if(curId && $("page-detail").style.display!=="none") renderDetail();
        checkBirthdays(members);
      }, function(){ dot("red"); });
    }catch(e){ dot("red"); }
  }, 100);
}

document.addEventListener("DOMContentLoaded", function(){
  var saved = loadName();
  if(saved){ $("t-inp").value = saved; }
  $("t-btn").addEventListener("click", goEnter);
  $("t-inp").addEventListener("keydown", function(e){
    if(e.key==="Enter"){ e.preventDefault(); goEnter(); }
  });
});

// ── HEADER ──────────────────────────────────────
function updateHdr(){
  var tot = Object.keys(members).length;
  var act = Object.values(members).reduce(function(s,m){
    return s + allActiveInjuries(m).length;
  },0);
  var checkedInToday = Object.values(members).filter(function(m){
    var cl = m.checkins||[];
    if(!cl.length) return false;
    return cl[cl.length-1].date === today();
  }).length;
  var h = $("hinfo"); if(h) h.textContent = tot+" members · ✓ "+checkedInToday+" checked in today";
}

// ── FILTERS ──────────────────────────────────────
function buildFilters(){
  var fadingCount = Object.values(members).filter(function(m){
    if(!m||!m.name) return false;
    var days = daysSinceLastCheckin(m);
    return days !== null && days >= 14;
  }).length;
  var items = ["All","Today","Legs","Chest","Back","Shoulders","Arms","Phoenix","Fading"];
  var el = $("filters"); el.innerHTML = "";
  // Count today's check-ins for badge
  var todayCount = Object.values(members).filter(function(m){
    var cl = m.checkins||[]; return cl.length && cl[cl.length-1].date===today();
  }).length;
  items.forEach(function(p){
    var b = document.createElement("button");
    b.className = "fb"+(filt===p?" on":"");
    if(p==="Today"){
      b.innerHTML = "Today" + (todayCount>0?'<span style="margin-left:5px;background:'+(filt==="Today"?"rgba(0,0,0,0.25)":"#e55a00")+';color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:800;">'+todayCount+'</span>':'');
    } else if(p==="Fading"){
      b.innerHTML = '👀 Fading' + (fadingCount>0?'<span style="margin-left:5px;background:'+(filt==="Fading"?"rgba(0,0,0,0.25)":"#ffaa44")+';color:#000;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:800;">'+fadingCount+'</span>':'');
    } else {
      b.textContent = p;
    }
    b.addEventListener("click", function(){ filt=p; buildFilters(); renderList(); });
    el.appendChild(b);
  });
}

document.addEventListener("DOMContentLoaded", function(){
  $("search").addEventListener("input", renderList);

  $("export-btn").addEventListener("click", openExport);
});

// ── LIST ──────────────────────────────────────
function rDay(r){ return typeof r==="object" ? (r.day||"") : r; }
function rPhase(r){ return typeof r==="object" ? (r.phase||"") : ""; }
function getNextDay(m){
  // Always returns the NEXT day in rotation (member list + tomorrow logic)
  var rot = m.rotation||[];
  if(!rot.length) return {day:"No rotation",phase:"",idx:0,col:"#666"};
  var cl = m.checkins||[];
  if(!cl.length) return {day:rDay(rot[0]),phase:rPhase(rot[0]),idx:0,col:DAY_COL[rDay(rot[0])]||"#e55a00"};
  var last = cl[cl.length-1];
  var li = last.rotIdx!=null ? last.rotIdx : 0;
  var ni = (li+1)%rot.length;
  return {day:rDay(rot[ni]),phase:rPhase(rot[ni]),idx:ni,col:DAY_COL[rDay(rot[ni])]||"#e55a00"};
}
function getTodaySession(m){
  // If checked in within last 5 minutes → locked; if today but >5min ago → unlocked but shows today's day
  var rot = m.rotation||[];
  if(!rot.length) return {day:"No rotation",phase:"",idx:0,col:"#666",checkedInToday:false,recentLock:false};
  var cl = m.checkins||[];
  if(!cl.length) return Object.assign(getNextDay(m),{checkedInToday:false,recentLock:false});
  var last = cl[cl.length-1];
  if(last.date === today()){
    var ti = last.rotIdx!=null ? last.rotIdx : rot.findIndex(function(r){return rDay(r)===last.day;});
    if(ti<0) ti=0;
    // Check if within 5-minute lock window
    var recentLock = false;
    if(last.timestamp){
      var elapsed = Date.now() - last.timestamp;
      recentLock = elapsed < 5 * 60 * 1000; // 5 minutes in ms
    }
    return {day:rDay(rot[ti]),phase:rPhase(rot[ti]),idx:ti,col:DAY_COL[rDay(rot[ti])]||"#e55a00",checkedInToday:true,recentLock:recentLock};
  }
  return Object.assign(getNextDay(m),{checkedInToday:false,recentLock:false});
}
function phaseNum(p){
  if(!p) return 0;
  var m=p.match(/(\d+)/);
  return m?parseInt(m[1]):0;
}

  m.dayAdjustments = adj;

function getNextBar(m, day, phase){
  // Check for manual override on the rotation entry
  var rot = m.rotation||[];
  var rotEntry = rot.find(function(r){ return rDay(r)===day; });
  var manualBar = rotEntry && typeof rotEntry==="object" ? (rotEntry.bar||"") : "";
  if(manualBar) return manualBar;

  // Chest Phase 4+ / Shoulders Phase 1+: manual Straight Bar or Valor Bar (default Straight Bar)
  if(day==="Chest" && phaseNum(phase)>=4) return manualBar || "Straight Bar";
  if(day==="Shoulders" && phaseNum(phase)>=1) return manualBar || "Straight Bar";
  // Auto-alternate based on check-in count; default bar before phase threshold
  if(day==="Legs"){
    var cnt=(m.checkins||[]).filter(function(c){return c.day==="Legs";}).length;
    if(phaseNum(phase)<2) return "Straight Bar";
    return cnt%2===0?"Transformer Bar":"Straight Bar";
  }
  if(day==="Back"){
    var cnt=(m.checkins||[]).filter(function(c){return c.day==="Back";}).length;
    if(phaseNum(phase)<5) return "Straight Bar";
    return cnt%2===0?"Trap Bar":"Straight Bar";
  }
  return null;
}

function daysSinceLastCheckin(m){
  var cl = m.checkins||[];
  if(!cl.length) return null; // never checked in
  var last = cl[cl.length-1].date;
  var a = new Date(today()); var b = new Date(last);
  return Math.floor((a - b) / (1000*60*60*24));
}

function getMiaMembers(){
  return Object.values(members).filter(function(m){

    var days = daysSinceLastCheckin(m);
    return days !== null && days >= 30;
  }).sort(function(a,b){
    return daysSinceLastCheckin(b) - daysSinceLastCheckin(a);
  });
}


function getWeekStart(){
  // Returns monday of current week (respecting 5am reset)
  var d = new Date();
  d.setHours(d.getHours() - 5);
  var day = d.getDay(); // 0=Sun,1=Mon...
  var diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}
function getMonthStart(){
  var d = new Date();
  d.setHours(d.getHours() - 5);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
}

var MAX_CARDIO = 1000;
function cardioHTML(m){
  var mins = m.cardioDebt || 0;
  var pct = Math.min(mins / MAX_CARDIO, 1);
  // SVG arc dial
  var r = 70, cx = 90, cy = 80, sw = 12;
  var startAngle = -210, endAngle = 30; // 240 degree sweep
  function polar(angle, radius){
    var rad = (angle-90)*Math.PI/180;
    return {x: cx+radius*Math.cos(rad), y: cy+radius*Math.sin(rad)};
  }
  var s = polar(startAngle, r), e1 = polar(endAngle, r);
  var fillEnd = startAngle + pct*240;
  var ef = polar(fillEnd, r);
  var lg = pct > 0.5 ? 1 : 0;
  var lg2 = pct > 0.5 ? 1 : 0;
  var trackPath = "M "+s.x+" "+s.y+" A "+r+" "+r+" 0 1 1 "+e1.x+" "+e1.y;
  var fillPath = pct <= 0 ? "" : (pct >= 1
    ? "M "+s.x+" "+s.y+" A "+r+" "+r+" 0 1 1 "+e1.x+" "+e1.y
    : "M "+s.x+" "+s.y+" A "+r+" "+r+" 0 "+lg+" 1 "+ef.x+" "+ef.y);
  var col = mins >= 800 ? "#ff5555" : mins >= 400 ? "#ffc107" : "#e55a00";
  return '<div class="dial-wrap">'+
    '<svg class="dial-svg" width="180" height="110" viewBox="0 0 180 110">'+
      '<path d="'+trackPath+'" fill="none" stroke="#2a2a2a" stroke-width="'+sw+'" stroke-linecap="round"/>'+
      (fillPath?'<path d="'+fillPath+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-linecap="round"/>'  :'')+
      '<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" font-size="22" font-weight="900" fill="'+col+'">'+mins+'</text>'+
      '<text x="'+cx+'" y="'+(cy+24)+'" text-anchor="middle" font-size="9" fill="#555">MINUTES</text>'+
    '</svg>'+
    '<div class="dial-sub">'+(mins===0?'No cardio debt ✓':mins+' / '+MAX_CARDIO+' mins owed')+'</div>'+
    '<div class="dial-btns">'+
      '<button class="dial-btn dial-sub-btn" data-a="csub">− Reduce</button>'+
      '<button class="dial-btn dial-add" data-a="cadd">+ Add Debt</button>'+
    '</div>'+
  '</div>';
}

function getPhaseExerciseList(day, phase){
  var dayData = GUIDE_DATA[day];
  if(!dayData || !dayData.phases) return DAY_EXERCISES[day]||[];
  // Find matching phase entry
  var pNum = phaseNum(phase);
  var match = null;
  // Try exact title match first
  dayData.phases.forEach(function(p){
    if(p.title.indexOf(phase)>=0) match = p;
  });
  // Fall back to phase number proximity
  if(!match && pNum > 0){
    var best = null, bestDiff = 999;
    dayData.phases.forEach(function(p){
      var n = phaseNum(p.title);
      var diff = Math.abs(n - pNum);
      if(diff < bestDiff){ bestDiff = diff; best = p; }
    });
    match = best;
  }
  if(!match) match = dayData.phases[0];
  if(!match) return DAY_EXERCISES[day]||[];
  // Extract exercises from match (handle both flat exercises and sections)
  var exes = [];
  if(match.exercises) exes = match.exercises;
  else if(match.sections) match.sections.forEach(function(s){ (s.exercises||[]).forEach(function(e){ exes.push(e); }); });
  // Strip trailing notes like "— 5×20" from names for cleaner dropdown labels
  return exes.map(function(e){ return e.split(" — ")[0].split(" (")[0].trim(); });
}

// ── SAVE ──────────────────────────────────────
function saveM(m){
  members[m.id] = m;
  if(db) db.ref("members/"+m.id).set(m).catch(function(err){ console.error("Firebase save failed:", err); alert("Save failed: " + err.message); });
  renderList();
  if(curId===m.id) renderDetail();
}

function openMemberForm(m){

  var rot = m ? (m.rotation||[]).map(function(r){return typeof r==="object"?{day:r.day||"",phase:r.phase||"",bar:r.bar||""}:{day:r,phase:"",bar:""};}) : [{day:"Legs",phase:"Phase 1"},{day:"Chest",phase:"Phase 1"},{day:"Back",phase:"Phase 1"},{day:"Shoulders",phase:"Phase 1"},{day:"Arms",phase:"Phase 1"}];

  openM(
    '<div class="mhandle"></div>'+
    '<div class="mh2">'+(m?'Edit Member':'New Member')+'</div>'+
    '<div class="fg"><label>Full Name *</label><input id="fn" value="'+esc(m?m.name||'':'')+'" placeholder="e.g. Alex Carter" autocomplete="off"></div>'+
    '<div class="f2">'+
      '<div class="fg"><label>Phone</label><input id="fp" type="tel" value="'+esc(m?m.phone||'':'')+'"></div>'+
      '<div class="fg"><label>Join Date</label><input id="fj" type="date" value="'+esc(m?m.joinDate||today():today())+'"></div>'+
    '</div>'+
    '<div class="fg"><label>Birthday</label><input id="fbday" type="date" value="'+esc(m&&m.birthday?m.birthday:'')+'"></div>'+
    '<div class="fg"><label>Email</label><input id="fe" type="email" value="'+esc(m?m.email||'':'')+'"></div>'+
    '<div class="fg"><label>Goal</label><input id="fgoal" value="'+esc(m?m.goal||'':'')+'" placeholder="e.g. Lose 20lbs, Train for marathon, Build strength" autocomplete="off"></div>'+

    '<div class="fg"><label>Workout Rotation (in order)</label><div class="daylist" id="dlist"></div><button class="adddaybtn" id="addday">+ Add Day</button></div>'+
    '<div class="fbtns"><button class="fcancel" id="mfc">Cancel</button><button class="fsave" id="mfs">Save</button></div>',
    function(){
      function renderDays(){
        var dl = $("dlist"); dl.innerHTML = "";
        rot.forEach(function(entry, i){
          var curDay = rDay(entry); var curPhase = rPhase(entry);
          var row = document.createElement("div"); row.className = "dayrow";

          var phOpts = PHASES.map(function(p){return'<option'+(curPhase===p?' selected':'')+'>'+p+'</option>';}).join('');
          row.innerHTML = '<span class="daynum">'+(i+1)+'</span><select class="dsel">'+dayOpts+'</select><select class="psel" style="border-color:#e55a00;color:#ffc107;">'+phOpts+'</select><button class="dayrem">&#215;</button>';
          row.querySelector(".dsel").addEventListener("change", function(){
            rot[i]={day:this.value, phase:rPhase(rot[i]), bar:typeof rot[i]==="object"?rot[i].bar:""};
            renderDays();
          });
          row.querySelector(".psel").addEventListener("change", function(){ rot[i]={day:rDay(rot[i]),phase:this.value,bar:typeof rot[i]==="object"?rot[i].bar:""}; });
          row.querySelector(".dayrem").addEventListener("click", function(){ rot.splice(i,1); renderDays(); });
          dl.appendChild(row);
        });
      }
      renderDays();
      $("addday").addEventListener("click", function(){ rot.push({day:"Legs",phase:"Phase 1"}); renderDays(); });
      $("mfc").addEventListener("click", closeM);
      $("mfs").addEventListener("click", function(){
        var name = ($("fn").value||"").trim();
        if(!name){ alert("Name is required."); return; }
        if(!rot.length){ alert("Add at least one workout day."); return; }
        var rot2 = rot.map(function(r){return typeof r==="object"?{day:r.day||"",phase:r.phase||"",bar:r.bar||""}:{day:r,phase:"",bar:""};});
        var data = Object.assign({}, m||{}, {
          id: id||uid(), name:name,
          phone:($("fp").value||"").trim(),
          email:($("fe").value||"").trim(),
          goal:($("fgoal").value||"").trim(),
          isPhoenix: m ? !!m.isPhoenix : false,
          phase: rot2.length ? (rot2[0].phase||"") : "",
          joinDate:$("fj").value,
          birthday:$("fbday").value||"",
          rotation:rot2,
          notes:m?m.notes||[]:[],
          injuries:m?m.injuries||[]:[],
          checkins:m?m.checkins||[]:[]
        });
        saveM(data);
        closeM();
        if(id){ curId=id; renderDetail(); }
      });
    }
  );
}

function checkBirthdays(membersObj){
  var now = new Date();

  function daysUntilMD(mdStr){
    var parts = mdStr.split("-");
    var thisYear = new Date(now.getFullYear(), parseInt(parts[0])-1, parseInt(parts[1]));
    var today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if(thisYear < today0) thisYear.setFullYear(now.getFullYear()+1);
    return Math.round((thisYear - today0) / (1000*60*60*24));
  }

  var events = [];
  Object.values(membersObj).forEach(function(m){
    if(!m || !m.name) return;
    if(m.birthday){
      var diff = daysUntilMD(m.birthday.substring(5));
      if(diff <= 7) events.push({type:"bday", name:m.name, days:diff});
    }
    if(m.joinDate){
      var jd = new Date(m.joinDate+"T12:00:00");
      var today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if(Math.floor((today0-jd)/(1000*60*60*24)) < 300) return;
      var annivMD = String(jd.getMonth()+1).padStart(2,"0")+"-"+String(jd.getDate()).padStart(2,"0");
      var diff2 = daysUntilMD(annivMD);
      if(diff2 > 7) return;
      var years = now.getFullYear()-jd.getFullYear(); if(diff2>0) years--; if(years<1) years=1;
      events.push({type:"anniv", name:m.name, days:diff2, years:years});
    }
  });
  events.sort(function(a,b){ return a.days-b.days; });

  // Badge on cake button
  var badge = document.getElementById("bday-badge");
  if(badge){
    badge.textContent = events.length > 9 ? "9+" : events.length;
    badge.style.display = events.length ? "block" : "none";
  }

  // Compact tag chips
  var panel = document.getElementById("upcoming-events");
  var panelList = document.getElementById("upcoming-events-list");
  if(panel && panelList){
    if(!events.length){ panel.style.display="none"; return; }
    var tagsHTML = '<span style="font-size:11px;font-weight:800;color:#e55a00;text-transform:uppercase;letter-spacing:.5px;margin-right:2px;">🔔</span>';
    tagsHTML += events.map(function(e){
      var icon = e.type==="bday" ? "🎂" : "🎉";
      var when = e.days===0 ? "Today!" : e.days===1 ? "Tomorrow" : "In "+e.days+"d";
      var bg = e.days===0 ? "rgba(255,193,7,0.2)" : "rgba(229,90,0,0.15)";
      var border = e.days===0 ? "#ffc107" : "#e55a00";
      var color = e.days===0 ? "#ffc107" : "#ff9944";
      return '<span style="display:inline-flex;align-items:center;gap:4px;background:'+bg+';border:1px solid '+border+';border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;color:'+color+';">'+
        icon+' '+esc(e.name.split(' ')[0])+' · '+when+'</span>';
    }).join('');
    panelList.innerHTML = tagsHTML;
    panel.style.display = "block";
  }
}

function getBirthdayList(membersObj){
  var today2 = new Date();
  var mm = String(today2.getMonth()+1).padStart(2,"0");
  var dd = String(today2.getDate()).padStart(2,"0");
  var todayMD = mm+"-"+dd;
  var list = Object.values(membersObj).filter(function(m){ return m.birthday; }).map(function(m){
    var bdayMD = m.birthday.substring(5);
    var isToday = bdayMD === todayMD;
    var bdayDate = new Date(today2.getFullYear(), parseInt(bdayMD.split("-")[0])-1, parseInt(bdayMD.split("-")[1]));
    if(bdayDate < today2 && !isToday) bdayDate.setFullYear(today2.getFullYear()+1);
    var diff = isToday ? 0 : Math.round((bdayDate - today2)/(1000*60*60*24));
    return {name:m.name, birthday:m.birthday, bdayMD:bdayMD, diff:diff, isToday:isToday};
  });
  list.sort(function(a,b){ return a.diff-b.diff; });
  return list;
}

function openBirthdayList(){
  var list = getBirthdayList(members);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var today2 = new Date();
  var mm2 = String(today2.getMonth()+1).padStart(2,"0");
  var dd2 = String(today2.getDate()).padStart(2,"0");
  var todayMD = mm2+"-"+dd2;

  // Build anniversary list
  var annexList = Object.values(members).filter(function(m){ return m.joinDate; }).map(function(m){
    var jd = new Date(m.joinDate);
    var years = Math.floor((today2-jd)/(1000*60*60*24*365));
    if(years < 1) return null;
    var annivMD = String(jd.getMonth()+1).padStart(2,"0")+"-"+String(jd.getDate()).padStart(2,"0");
    var isToday = annivMD === todayMD;
    var annivDate = new Date(today2.getFullYear(), jd.getMonth(), jd.getDate());
    if(annivDate < today2 && !isToday) annivDate.setFullYear(today2.getFullYear()+1);
    var diff = isToday ? 0 : Math.round((annivDate - today2)/(1000*60*60*24));
    if(diff > 30) return null; // only show within 30 days
    return {name:m.name, years:years, diff:diff, isToday:isToday, joinDate:m.joinDate};
  }).filter(Boolean).sort(function(a,b){ return a.diff-b.diff; });

  var bdayRows = list.length ? list.map(function(b){
    var parts = b.birthday.split("-");
    var dateStr = months[parseInt(parts[1])-1]+" "+parseInt(parts[2]);
    var status = b.isToday ? '<span style="color:#ffc107;font-weight:800;">🎂 TODAY!</span>' :
      b.diff <= 7 ? '<span style="color:#e55a00">in '+b.diff+' days</span>' :
      '<span style="color:#555">in '+b.diff+' days</span>';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a;">'+
      '<div><div style="font-weight:700;font-size:14px;">'+esc(b.name)+'</div><div style="font-size:12px;color:#555;">'+dateStr+'</div></div>'+
      status+'</div>';
  }).join("") : '<div class="empty">No birthdays on file</div>';

  var annexRows = annexList.length ? annexList.map(function(a){
    var status = a.isToday ? '<span style="color:#c4b5fd;font-weight:800;">🎉 TODAY!</span>' :
      a.diff <= 7 ? '<span style="color:#c4b5fd">in '+a.diff+' days</span>' :
      '<span style="color:#555">in '+a.diff+' days</span>';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a;">'+
      '<div><div style="font-weight:700;font-size:14px;">'+esc(a.name)+'</div><div style="font-size:12px;color:#555;">'+a.years+' year'+(a.years===1?'':'s')+' member</div></div>'+
      status+'</div>';
  }).join("") : '<div class="empty">No upcoming anniversaries</div>';

  openM(
    '<div class="mhandle"></div>'+
    '<div class="mh2">🎂 Birthdays & Anniversaries</div>'+
    '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#ffc107;margin-bottom:8px;">Birthdays</div>'+
    '<div>'+bdayRows+'</div>'+
    '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#c4b5fd;margin-top:18px;margin-bottom:8px;">🎉 Gym Anniversaries (next 30 days)</div>'+
    '<div>'+annexRows+'</div>'+
    '<div style="margin-top:14px;"><button class="fsave" id="bday-close" style="width:100%">Close</button></div>',
    function(){ document.getElementById("bday-close").addEventListener("click", closeM); }
  );
}

function dlFile(blob,name){
